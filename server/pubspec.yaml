name: blinkpay_proxy_server
description: >-
  Proxy server for the BlinkPay Flutter demo.
  Holds BlinkPay API credentials server-side so the mobile app never sees them.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  http: ^1.6.0
  dotenv: ^4.2.0

dev_dependencies:
  lints: ^6.1.0
